[pytest]

# -------------------------------------------------
# Test discovery
# -------------------------------------------------

testpaths = tests
pythonpath = src

python_files = test_*.py
python_classes = Test*
python_functions = test_*


# -------------------------------------------------
# Default command line options
# -------------------------------------------------

addopts =
    -vv
    --strict-markers
    --strict-config
    --html=tests/report.html
    --self-contained-html
    --durations=10
    --cov=src
    --cov-report=html


# -------------------------------------------------
# Markers
# -------------------------------------------------

markers =
    slow: long running simulation tests
    cycle: full engine cycle regression tests
    integration: integration tests using solve_ivp
    smoke: quick smoke tests


# -------------------------------------------------
# Logging configuration
# -------------------------------------------------

log_cli = true
log_cli_level = INFO

log_file = tests/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(message)s


# -------------------------------------------------
# Warnings
# -------------------------------------------------

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning


# -------------------------------------------------
# Output formatting
# -------------------------------------------------

console_output_style = progress